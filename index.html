<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>tuco.cc</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #ffffff;
      color: #111;

      display: flex;
      justify-content: center;

      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      padding: 40px 20px 20px;
    }

    .topo {
      margin-top: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }

    .email-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 16px;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      padding-bottom: 2px;
    }

    .email-link:hover {
      border-color: #111;
    }

    .imagem {
      margin-top: 40px;
    }

    .imagem img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      background: #ffffff;
      display: block;
      margin: 0 auto;
    }

    footer {
      margin-top: 50px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topo">
      <h1>tuco.cc</h1>
      <p>Presença mínima. Controle máximo.</p>

      <a href="mailto:tuco@tuco.cc" class="email-link">
        envie-me uma mensagem
      </a>
    </div>

    <div class="imagem">
      <img src="image.png?v=2" alt="Estratégia e controle">
    </div>

    <footer>
      domínio sob controle
    </footer>

  </div>

</body>
</html>
